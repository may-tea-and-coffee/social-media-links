<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Tea & Coffee Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <img src="images/logo.png" class="logo">
        <h1>May Tea & Coffee</h1>
    </header>

    <div id="menu-container"></div>

    <div class="note-box">
        <div class="note">
            <strong>Ice Level</strong> Regular / Less / No Ice
        </div>
        <div class="note">
            <strong>Sugar Level</strong> 0% • 30% • 50% • 70% • 100%
        </div>
        <div class="note">
            <strong>Note</strong> Oat Milk +$0.75
        </div>
    </div>

    <div class="footer-social">
        <a href="https://www.facebook.com/profile.php?id=61587109587784" class="social-icon"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/mayteacoffee.pa" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@may.tea.coffee0" class="social-icon"><i class="fab fa-tiktok"></i></a>
    </div>

    <footer class="footer">
        <a href="tel:1111111111" class="footer-btn">
            <i class="fa-solid fa-phone"></i> CALL
        </a>
        <a href="https://www.google.com/maps/dir/?api=1&destination=1101+N+Hermitage+Rd+Hermitage+PA+16148" class="footer-btn">
            <i class="fa-solid fa-location-arrow"></i> DIRECTION
        </a>
    </footer>

    <script src="menu.js"></script>
</body>
</html>
