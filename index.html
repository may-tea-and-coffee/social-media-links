<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Tea & Coffee - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient Cloud Blue chuyên nghiệp */
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            color: #455a64;
        }

        .phone {
            width: 380px;
            max-width: 90%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            /* Loại bỏ hoàn toàn bo góc theo ý bạn */
            border-radius: 0; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            padding: 40px 25px;
            text-align: center;
        }

        /* BANNER KHUYẾN MÃI - GÓC VUÔNG */
        #promo-banner {
            display: none; 
            background: #1e88e5;
            color: white;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px dashed rgba(255,255,255,0.5);
            animation: fadeInDown 0.5s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .promo-title { font-weight: 800; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        .promo-date { font-size: 11px; opacity: 0.9; margin-top: 5px; font-weight: 300; }

        .logo-img { width: 100px; margin-bottom: 10px; }
        .logo { font-size: 26px; font-weight: 700; letter-spacing: 1.5px; color: #1e88e5; text-transform: uppercase; }
        .subtitle { font-size: 11px; letter-spacing: 3px; opacity: 0.6; margin-bottom: 30px; color: #546e7a; }

        .links { display: flex; flex-direction: column; gap: 10px; }
        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #ffffff;
            text-decoration: none;
            color: #1565c0;
            padding: 15px;
            border-radius: 0; /* Góc vuông */
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .links a:hover {
            background: #1e88e5;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.2);
        }

        /* DÒNG CHỮ CHÀO MỜI */
        .welcome-note {
            margin-top: 25px;
            font-size: 13px;
            font-style: italic;
            color: #1e88e5;
            line-height: 1.6;
            padding: 0 10px;
        }

        .contact { margin-top: 20px; display: flex; justify-content: center; gap: 30px; }
        .contact a { color: #1e88e5; font-size: 22px; transition: 0.3s; }
        .contact a:hover { transform: scale(1.2); color: #0d47a1; }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #78909c;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="phone">
    <div id="promo-banner">
        <div id="promo-text" class="promo-title"></div>
        <div id="promo-period" class="promo-date"></div>
    </div>

    <img src="images/logo.png" alt="May Tea & Coffee" class="logo-img">
    <div class="logo">May Tea & Coffee</div>
    <div class="subtitle">TEA • COFFEE • SMOOTHIES</div>

    <div class="links">
        <a href="menu.html">
            <i class="fa-solid fa-utensils"></i> VIEW MENU
        </a>
        <a href="https://www.facebook.com/profile.php?id=61587109587784" target="_blank">
            <i class="fab fa-facebook-f"></i> FACEBOOK
        </a>
        <a href="https://www.instagram.com/mayteacoffee.pa" target="_blank">
            <i class="fab fa-instagram"></i> INSTAGRAM
        </a>
        <a href="https://www.tiktok.com/@may.tea.coffee0" target="_blank">
            <i class="fab fa-tiktok"></i> TIKTOK
        </a>
        <a href="https://maps.google.com/?q=1101+N+Hermitage+Rd,+Hermitage,+PA+16148" target="_blank">
            <i class="fa-solid fa-location-dot"></i> GET DIRECTIONS
        </a>
    </div>

    <div class="welcome-note">
        It's our pleasure to welcome you to May Coffee.<br>
        <b>Click</b> or <b>Call</b> us now—we welcome everyone (except Minh Dang)! ✨
    </div>

    <div class="contact">
        <a href="tel:1111111111"><i class="fa-solid fa-phone"></i></a>
        <a href="mailto:mayteacoffee98@gmail.com"><i class="fa-solid fa-envelope"></i></a>
    </div>

    <div class="footer">
        📍 1101 N Hermitage Rd, Hermitage, PA 16148
    </div>
</div>

<script>
    /**
     * PROMO CONFIGURATION
     * Edit this object to update your promotion via Git without touching the HTML structure.
     */
    const PROMO_SETTINGS = {
        show: true, // Set to false to hide the banner
        title: " Soft Opening - 15% OFF",
        dateRange: "From dd/mm to dd/mm, and except Minh Dang"
    };

    function loadPromo() {
        const banner = document.getElementById('promo-banner');
        if (PROMO_SETTINGS.show) {
            document.getElementById('promo-text').innerText = PROMO_SETTINGS.title;
            document.getElementById('promo-period').innerText = PROMO_SETTINGS.dateRange;
            banner.style.display = 'block';
        }
    }

    loadPromo();
</script>

</body>
</html>
