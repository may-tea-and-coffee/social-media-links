body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f6cbd,#4ea0f5);
    font-family:"Segoe UI", "Segoe UI Variable", system-ui, sans-serif;
}

.phone{
    width:340px;
    height:640px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    padding:50px 30px;
    color:white;
    text-align:center;
    border:1px solid rgba(255,255,255,0.15);

.logo{
    font-size:28px;

    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    opacity:0.8;
    margin-bottom:45px;
}

.links a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    background:rgba(255,255,255,0.15);
    text-decoration:none;
    color:white;
    padding:14px;
    margin:16px 0;
    border-radius:14px;
    font-size:16px;
    font-weight:500;
    transition:all .25s ease;
}

.links a:hover{
    background:white;
    color:#0f6cbd;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.links i{
    font-size:18px;
}

.footer{
    position:absolute;
    bottom:30px;
    left:0;
    right:0;
    text-align:center;
    font-size:12px;
    opacity:0.7;
